<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY WARFARE: MASTER ENGINE v5.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        /* CSS STYLING SECTION */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif;
            user-select: none; touch-action: none;
        }

        canvas { display: block; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px; background: linear-gradient(to bottom, rgba(0, 210, 255, 0.25), transparent);
        }

        .stat-box { display: flex; flex-direction: column; }
        .label { font-size: 11px; color: #00d2ff; letter-spacing: 2px; font-weight: 700; }
        .value { font-size: 26px; color: #fff; font-weight: 900; text-shadow: 0 0 12px #00d2ff; }

        .shield-bar-outer {
            width: 160px; height: 12px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00d2ff; border-radius: 6px; margin-top: 6px; overflow: hidden;
        }

        #shield-fill {
            width: 100%; height: 100%; background: linear-gradient(90deg, #00d2ff, #00f2fe);
            box-shadow: 0 0 15px #00d2ff; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #boss-hud {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            width: 85%; opacity: 0; transition: opacity 0.8s ease-in-out;
        }

        .boss-hp-outer {
            width: 100%; height: 18px; background: rgba(255, 0, 0, 0.15);
            border: 2px solid #ff3e3e; border-radius: 10px; position: relative;
        }

        #boss-hp-inner {
            width: 100%; height: 100%; background: linear-gradient(90deg, #7b0000, #ff0000);
            box-shadow: 0 0 20px #ff0000;
        }

        .notification-system {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; pointer-events: none; transition: 0.5s;
        }

        .evo-msg { font-size: 45px; font-weight: 900; color: #00d2ff; text-shadow: 0 0 35px #00d2ff; margin: 0; }

        .game-over-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
        }

        .btn-restart {
            margin-top: 40px; padding: 18px 60px; background: transparent;
            border: 3px solid #00d2ff; color: #00d2ff; font-weight: 900;
            font-size: 18px; cursor: pointer; border-radius: 8px; transition: 0.4s;
            font-family: 'Orbitron'; letter-spacing: 3px;
        }

        .btn-restart:hover { background: #00d2ff; color: #000; box-shadow: 0 0 40px #00d2ff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="header">
            <div class="stat-box">
                <span class="label">MISSION DISTANCE</span>
                <span id="dist-val" class="value">0000</span>
            </div>
            <div class="stat-box" style="align-items: flex-end;">
                <span id="pilot-rank" class="label">RANK: ROOKIE</span>
                <div class="shield-bar-outer">
                    <div id="shield-fill"></div>
                </div>
            </div>
        </div>

        <div id="boss-hud">
            <div class="label" style="text-align:center; color:#ff3e3e; margin-bottom:6px; font-size: 14px;">ULTIMATE OVERLORD</div>
            <div class="boss-hp-outer">
                <div id="boss-hp-inner"></div>
            </div>
        </div>

        <div id="evo-notify" class="notification-system">
            <p class="evo-msg">SYSTEM EVOLVED</p>
            <p style="color: #fff; letter-spacing: 6px;">LEVEL UPGRADED</p>
        </div>
    </div>

    <div id="death-screen" class="game-over-modal">
        <h1 style="color:#ff3e3e; font-size: 60px; margin-bottom: 0;">TERMINATED</h1>
        <p style="color:#fff; font-size: 20px; letter-spacing: 4px; margin-top: 10px;">FINAL DISTANCE: <span id="final-res">0</span>M</p>
        <button class="btn-restart" onclick="location.reload()">RE-INITIALIZE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
    /**
     * GALAXY WARFARE MEGA ENGINE
     * ALL-IN-ONE MASTER SCRIPT
     */

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Global Constants
    const EVO_TARGET = 1000;
    const BOSS_TARGET = 1500;
    const MAX_LVL = 6;

    // Game Variables
    let w, h, dist = 0, frames = 0, isLive = true, shake = 0;
    let pLvl = 1, bLvl = 1, pHP = 100;
    
    // Entity Collections
    let stars = [], particles = [], pBullets = [], eBullets = [], enemies = [], activeBoss = null;

    // --- AUDIO ENGINE ---
    const Sfx = {
        bgm: new Audio('skybound_pursuit.mp3'),
        laser: new Audio('hull_breach.mp3'),
        hit: new Audio('hull_breach_protocol.mp3'),
        evo: new Audio('summit_reached.mp3'),
        boss: new Audio('the_titan_s_descent.mp3'),
        boom: new Audio('titanium_hull_stress.mp3')
    };
    Sfx.bgm.loop = true;
    Sfx.bgm.volume = 0.4;

    function triggerSfx(sound) {
        let n = sound.cloneNode();
        n.play().catch(() => {});
    }

    // Asset Loader
    const Img = { p: [], b: [], e: [], ready: false };
    function loadAssets() {
        let count = 0;
        for(let i=1; i<=6; i++) {
            const p = new Image(); p.src = `p${i}.png`; p.onload = () => count++; Img.p.push(p);
            const b = new Image(); b.src = `b${i}.png`; b.onload = () => count++; Img.b.push(b);
            const e = new Image(); e.src = `e${i}.png`; e.onload = () => count++; Img.e.push(e);
        }
    }

    // --- CLASSES ---
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 12;
            this.vy = (Math.random() - 0.5) * 12;
            this.life = 1.0; this.color = color;
            this.size = Math.random() * 5 + 2;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.025; }
        draw() {
            ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    class Star {
        constructor() {
            this.x = Math.random() * innerWidth;
            this.y = Math.random() * innerHeight;
            this.sz = Math.random() * 2.5;
            this.sp = Math.random() * 4 + 1;
        }
        update() { this.y += this.sp; if(this.y > h) this.y = -10; }
        draw() { ctx.fillStyle = "#fff"; ctx.fillRect(this.x, this.y, this.sz, this.sz); }
    }

    const Hero = {
        x: 0, y: 0, tx: 0, ty: 0, w: 85, h: 95,
        update() {
            this.x += (this.tx - this.x) * 0.16;
            this.y += (this.ty - this.y) * 0.16;
            if(frames % Math.max(5, 12 - pLvl) === 0) this.fire();
        },
        fire() {
            triggerSfx(Sfx.laser);
            pBullets.push(new Projectile(this.x, this.y - 45, 0, -22, 2 + pLvl));
            if(pLvl >= 3) {
                pBullets.push(new Projectile(this.x - 35, this.y, -2.5, -19, 1.5));
                pBullets.push(new Projectile(this.x + 35, this.y, 2.5, -19, 1.5));
            }
            if(pLvl >= 5) pBullets.push(new Projectile(this.x, this.y - 55, 0, -28, 12, true));
        },
        draw() {
            const img = Img.p[pLvl-1];
            if(img && img.complete) {
                // Engine Glow
                ctx.shadowBlur = 20; ctx.shadowColor = "#00d2ff";
                ctx.drawImage(img, this.x - this.w/2, this.y - this.h/2, this.w, this.h);
                ctx.shadowBlur = 0;
            }
        }
    };

    class Projectile {
        constructor(x, y, vx, vy, dmg, ultra = false) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.dmg = dmg; this.ultra = ultra;
        }
        update() { this.x += this.vx; this.y += this.vy; }
        draw() {
            ctx.fillStyle = this.ultra ? "#FFD700" : "#00f2fe";
            ctx.fillRect(this.x - (this.ultra?5:2.5), this.y, (this.ultra?10:5), 25);
        }
    }

    class Enemy {
        constructor(lvl) {
            this.x = Math.random() * (w - 80) + 40; this.y = -80;
            this.lvl = lvl; this.hp = 4 * lvl;
            this.sp = 2.8 + (lvl * 0.45); this.w = 68; this.h = 68;
            this.sin = Math.random() * 100;
        }
        update() {
            this.y += this.sp;
            this.x += Math.sin(this.sin + frames * 0.06) * 3.5;
            
            // --- 1x to 4x ENEMY ATTACK ---
            let rate = Math.max(30, 115 - (this.lvl * 14));
            if(frames % rate === 0) {
                const bSp = 6.5 + this.lvl;
                if(this.lvl <= 2) {
                    eBullets.push(new Projectile(this.x, this.y + 25, 0, bSp, 1));
                } else if(this.lvl <= 4) {
                    eBullets.push(new Projectile(this.x - 15, this.y + 25, -1.8, bSp, 1));
                    eBullets.push(new Projectile(this.x + 15, this.y + 25, 1.8, bSp, 1));
                } else if(this.lvl === 5) {
                    eBullets.push(new Projectile(this.x - 22, this.y + 25, -2.2, bSp, 1));
                    eBullets.push(new Projectile(this.x, this.y + 30, 0, bSp + 1.2, 1));
                    eBullets.push(new Projectile(this.x + 22, this.y + 25, 2.2, bSp, 1));
                } else {
                    eBullets.push(new Projectile(this.x - 28, this.y + 25, -3.5, bSp, 1));
                    eBullets.push(new Projectile(this.x - 10, this.y + 30, -1.2, bSp + 0.8, 1));
                    eBullets.push(new Projectile(this.x + 10, this.y + 30, 1.2, bSp + 0.8, 1));
                    eBullets.push(new Projectile(this.x + 28, this.y + 25, 3.5, bSp, 1));
                }
            }
        }
        draw() {
            const img = Img.e[this.lvl-1];
            if(img && img.complete) ctx.drawImage(img, this.x - this.w/2, this.y - this.h/2, this.w, this.h);
        }
    }

    class Boss {
        constructor(lvl) {
            this.lvl = lvl; this.w = 260 + (lvl*45); this.h = 190 + (lvl*35);
            this.x = w/2; this.y = -350; this.hp = 500 * lvl; this.max = 500 * lvl;
            this.dir = 1; this.phase = 'entry';
        }
        update() {
            if(this.phase === 'entry') {
                this.y += 2.5; if(this.y >= 160) this.phase = 'battle';
            } else {
                this.x += this.dir * (3.5 + this.lvl);
                if(this.x > w - this.w/2 || this.x < this.w/2) this.dir *= -1;
                if(frames % (65 - this.lvl*6) === 0) {
                    for(let i=-2; i<=2; i++) eBullets.push(new Projectile(this.x + i*45, this.y + 70, i*2.5, 9, 1));
                }
            }
        }
        draw() {
            const img = Img.b[this.lvl-1];
            if(img && img.complete) ctx.drawImage(img, this.x - this.w/2, this.y - this.h/2, this.w, this.h);
        }
    }

    // --- CORE FUNCTIONS ---
    function explode(x, y, color, qty = 18) {
        shake = 18;
        for(let i=0; i<qty; i++) particles.push(new Particle(x, y, color));
    }

    function checkGameProgress() {
        let currentLvl = Math.min(6, Math.floor(dist / EVO_TARGET) + 1);
        if(currentLvl > pLvl) {
            pLvl = currentLvl; pHP = 100; refreshUI();
            triggerSfx(Sfx.evo);
            const n = document.getElementById('evo-notify'); n.style.opacity = '1';
            setTimeout(() => n.style.opacity = '0', 3000);
            document.getElementById('pilot-rank').innerText = `RANK: ${["ROOKIE", "SCOUT", "RANGER", "COMMANDER", "ELITE", "LEGEND"][pLvl-1]}`;
        }
        if(dist > 0 && dist % BOSS_TARGET === 0 && !activeBoss && bLvl <= 6) {
            activeBoss = new Boss(bLvl);
            triggerSfx(Sfx.boss);
            document.getElementById('boss-hud').style.opacity = '1';
        }
    }

    function refreshUI() {
        const f = document.getElementById('shield-fill'); f.style.width = pHP + "%";
        f.style.background = pHP < 35 ? "linear-gradient(90deg, #7b0000, #ff0000)" : "linear-gradient(90deg, #00d2ff, #00f2fe)";
    }

    function dmgHero(amt) {
        pHP -= amt; shake = 14; refreshUI();
        triggerSfx(Sfx.hit);
        if(pHP <= 0) {
            isLive = false; triggerSfx(Sfx.boom);
            document.getElementById('death-screen').style.display = 'flex';
            document.getElementById('final-res').innerText = dist;
        }
    }

    function resize() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        Hero.x = Hero.tx = w / 2; Hero.y = Hero.ty = h - 160;
    }

    function init() {
        resize(); loadAssets();
        for(let i=0; i<120; i++) stars.push(new Star());
        window.addEventListener('resize', resize);
        window.addEventListener('touchmove', e => {
            if(Sfx.bgm.paused) Sfx.bgm.play();
            Hero.tx = e.touches[0].clientX; Hero.ty = e.touches[0].clientY - 65;
        }, {passive: false});
    }

    function update() {
        if(!isLive) return;
        frames++; if(frames % 5 === 0) dist++;
        document.getElementById('dist-val').innerText = dist.toString().padStart(4, '0');
        
        checkGameProgress();
        stars.forEach(s => s.update());
        Hero.update();
        particles.forEach((p, i) => { p.update(); if(p.life <= 0) particles.splice(i, 1); });

        pBullets.forEach((b, i) => {
            b.update(); if(b.y < -60) pBullets.splice(i, 1);
            enemies.forEach((e, ei) => {
                if(Math.hypot(b.x - e.x, b.y - e.y) < 45) {
                    e.hp -= b.dmg; pBullets.splice(i, 1);
                    explode(e.x, e.y, "#FF5722", 6);
                    if(e.hp <= 0) {
                        enemies.splice(ei, 1); triggerSfx(Sfx.boom);
                        explode(e.x, e.y, "#FFD700", 25);
                    }
                }
            });
            if(activeBoss) {
                if(b.x > activeBoss.x - activeBoss.w/2 && b.x < activeBoss.x + activeBoss.w/2 && 
                   b.y > activeBoss.y - activeBoss.h/2 && b.y < activeBoss.y + activeBoss.h/2) {
                    activeBoss.hp -= b.dmg; pBullets.splice(i, 1);
                    document.getElementById('boss-hp-inner').style.width = (activeBoss.hp / activeBoss.max * 100) + "%";
                    if(activeBoss.hp <= 0) {
                        triggerSfx(Sfx.boom); explode(activeBoss.x, activeBoss.y, "#ff0000", 60);
                        activeBoss = null; bLvl++; document.getElementById('boss-hud').style.opacity = '0';
                    }
                }
            }
        });

        if(frames % 45 === 0 && !activeBoss) enemies.push(new Enemy(pLvl));
        enemies.forEach((e, i) => {
            e.update(); if(e.y > h + 100) enemies.splice(i, 1);
            if(Math.hypot(e.x - Hero.x, e.y - Hero.y) < 55) { enemies.splice(i, 1); dmgHero(25); explode(Hero.x, Hero.y, "#ff0000", 20); }
        });

        eBullets.forEach((b, i) => {
            b.update(); if(b.y > h + 60) eBullets.splice(i, 1);
            if(Math.hypot(b.x - Hero.x, b.y - Hero.y) < 38) { eBullets.splice(i, 1); dmgHero(12); }
        });

        if(activeBoss) activeBoss.update();
        if(shake > 0) shake *= 0.92;
    }

    function render() {
        ctx.save();
        if(shake > 1.2) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        ctx.clearRect(0, 0, w, h);
        
        stars.forEach(s => s.draw());
        particles.forEach(p => p.draw());
        pBullets.forEach(b => b.draw());
        eBullets.forEach(b => b.draw());
        enemies.forEach(e => e.draw());
        if(activeBoss) activeBoss.draw();
        Hero.draw();
        
        ctx.restore();
    }

    function run() { update(); render(); requestAnimationFrame(run); }
    init(); run();
    </script>
</body>
</html>
